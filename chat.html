<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface - Secured</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --sidebar-bg: #f9f9fb;
            --sidebar-border: #e7eaee;
            --primary: #3b0692;
            --primary-hover: #4a0bb2;
            --text-main: #222222;
            --text-muted: #758696;
            --text-secondary: #404040;
            --error: #ea384c;
            --item-hover: rgba(0, 0, 0, 0.04);
            --item-active: rgba(59, 6, 146, 0.08);
            --input-bg: #ffffff;
            --input-border: #e7eaee;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: #e7eaee;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: row;
            position: relative;
        }

        /* --- Login Overlay --- */
        #login-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-color);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .login-box {
            background: transparent;
            padding: 40px;
            border: none;
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        .login-box h2 {
            margin-top: 0;
            margin-bottom: 12px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 4.5rem;
            line-height: 1.1;
            letter-spacing: -0.03em;
        }

        .login-box p.subtitle {
            color: var(--primary);
            font-size: 1.25rem;
            font-weight: 500;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        #login-error {
            color: var(--error);
            font-size: 0.85rem;
            margin-bottom: 16px;
            min-height: 20px;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .new-chat-btn {
            background: transparent;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: 300;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s;
            padding: 0;
        }

        .new-chat-btn:hover {
            background: rgba(59, 6, 146, 0.08);
            color: var(--primary-hover);
            transform: scale(1.05);
        }

        .chat-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-list::-webkit-scrollbar {
            width: 4px;
        }

        .chat-list::-webkit-scrollbar-thumb {
            background-color: var(--sidebar-border);
            border-radius: 2px;
        }

        .chat-item {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            transition: background 0.2s;
            color: var(--text-secondary);
        }

        .chat-item:hover {
            background: var(--item-hover);
            color: var(--text-main);
        }

        .chat-item.active {
            background: var(--item-active);
            color: var(--text-main);
        }

        .chat-title {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 2px;
            opacity: 0;
            transition: opacity 0.2s, color 0.2s;
        }

        .chat-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: var(--error);
        }

        /* --- Main Chat Interface --- */
        .main-chat {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--bg-color);
        }

        .header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid transparent;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            color: #00b0a4;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--sidebar-border);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: var(--item-hover);
            color: var(--text-main);
        }

        .chat-messages {
            flex-grow: 1;
            padding: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-messages-inner {
            width: 100%;
            max-width: 768px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding-bottom: 140px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background-color: var(--sidebar-border);
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: slideIn 0.3s ease-out;
            word-wrap: break-word;
            color: var(--text-main);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .avatar.user {
            background: #00b0a4;
            color: white;
        }

        .avatar.ai {
            background: #fcdf69;
            color: #1A1A1A;
        }

        .message-content {
            flex-grow: 1;
            padding-top: 4px;
            overflow-x: hidden;
        }

        .message-content p {
            margin-top: 0;
            margin-bottom: 12px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul,
        .message-content ol {
            margin-top: 0;
            margin-bottom: 12px;
            padding-left: 24px;
        }

        .message-content li {
            margin-bottom: 6px;
        }

        .message-content code {
            background: #f3f5fb;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: monospace;
            border: 1px solid var(--sidebar-border);
            color: var(--primary);
        }

        .message-content pre {
            background: #f3f5fb;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--sidebar-border);
            margin-bottom: 12px;
        }

        .message-content pre code {
            background: transparent;
            padding: 0;
            border: none;
            color: inherit;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Floating Input --- */
        .input-container {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            padding: 0 24px;
        }

        .input-area {
            width: 100%;
            max-width: 768px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 16px;
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            pointer-events: auto;
            align-items: center;
        }

        .input-area input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
        }

        .input-area input::placeholder {
            color: var(--text-muted);
        }

        .input-area button {
            background: var(--primary);
            color: #ffffff;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .input-area button:hover {
            background: var(--primary-hover);
        }

        .input-area button svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .loading {
            display: flex;
            gap: 6px;
            padding: 8px 0;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.5;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .empty-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            color: var(--text-muted);
            font-size: 1.1rem;
            height: 100%;
        }

        /* --- Modal --- */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .modal-box {
            background: #ffffff;
            border: 1px solid var(--sidebar-border);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .modal-box h3 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .modal-box input,
        .modal-box select {
            width: 100%;
            box-sizing: border-box;
            background: #ffffff;
            border: 1px solid var(--sidebar-border);
            padding: 12px;
            border-radius: 8px;
            color: var(--text-main);
            margin-bottom: 16px;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        .modal-box input:focus,
        .modal-box select:focus {
            border-color: var(--primary);
        }

        .modal-box option {
            background: var(--bg-color);
        }

        .modal-box .btn-row {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-box button {
            background: var(--primary);
            color: #ffffff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .modal-box button:hover {
            background: var(--primary-hover);
        }

        .modal-box button.cancel {
            background: transparent;
            border: 1px solid var(--sidebar-border);
            color: var(--text-muted);
        }

        .modal-box button.cancel:hover {
            background: var(--sidebar-bg);
            color: var(--text-main);
        }
    </style>
</head>

<body>

    <div class="app-container">

        <!-- Login Overlay -->
        <div id="login-overlay">
            <div class="login-box">
                <h2>Need help with your track? Ask away</h2>
                <p class="subtitle">Your Personal EIF AI Advisor</p>
                <div id="login-error"></div>
                <div id="buttonDiv" style="display: flex; justify-content: center; margin-top: 20px;"></div>
            </div>
        </div>

        <!-- New Chat Modal -->
        <div id="new-chat-modal" class="modal-overlay hidden">
            <div class="modal-box">
                <h3>Create New Chat</h3>
                <input type="text" id="new-chat-title" placeholder="Chat Title (e.g. Help with math)"
                    autocomplete="off">
                <select id="new-chat-advisor">
                    <option value="">Loading advisors...</option>
                </select>
                <div class="btn-row">
                    <button class="cancel" onclick="closeNewChatModal()">Cancel</button>
                    <button onclick="submitNewChat()">Create</button>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Chats</h2>
                <button class="new-chat-btn" onclick="openNewChatModal()" title="New Chat">+</button>
            </div>
            <div class="chat-list" id="chatList">
                <!-- Chat items will be injected here -->
            </div>
        </div>

        <!-- Main Chat Interface -->
        <div class="main-chat">
            <div class="header">
                <div class="header-title">
                    <h1 id="active-advisor-name">AI Advisor</h1>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <div class="chat-messages" id="chatbox">
                <div class="chat-messages-inner" id="chatbox-inner">
                    <div class="empty-chat">Select or create a chat to begin.</div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-area">
                    <input type="text" id="userInput" placeholder="Message..." autocomplete="off"
                        onkeypress="if(event.key==='Enter') sendMessage()" disabled>
                    <button id="sendBtn" onclick="sendMessage()" disabled>
                        <svg viewBox="0 0 24 24">
                            <path d="M3 20V4L22 12L3 20ZM5 17L16.85 12L5 7V10.5L11 12L5 13.5V17Z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = '';
        let accessToken = localStorage.getItem('access_token');
        let activeChatId = null;

        window.onload = async () => {
            if (accessToken) {
                document.getElementById('login-overlay').classList.add('hidden');
                await loadChats();
            }

            try {
                const res = await fetch('/auth/config');
                const config = await res.json();
                if (config.google_client_id) {
                    google.accounts.id.initialize({
                        client_id: config.google_client_id,
                        callback: handleCredentialResponse
                    });
                    google.accounts.id.renderButton(
                        document.getElementById("buttonDiv"),
                        { theme: "filled_black", size: "large", shape: "pill", text: "continue_with" }
                    );
                } else {
                    document.getElementById('login-error').innerText = "Google Client ID not configured.";
                }
            } catch (e) {
                console.error("Failed to load auth config", e);
                document.getElementById('login-error').innerText = "Failed to reach server.";
            }
        };

        // --- Auth Functions --- //

        async function handleCredentialResponse(response) {
            const errorDiv = document.getElementById('login-error');
            errorDiv.innerText = '';

            try {
                const res = await fetch(`${API_URL}/auth/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });

                if (res.ok) {
                    const data = await res.json();
                    accessToken = data.access_token;
                    localStorage.setItem('access_token', accessToken);
                    if (data.picture) {
                        localStorage.setItem('profile_picture', data.picture);
                    }

                    document.getElementById('login-overlay').classList.add('hidden');
                    await loadChats();
                } else {
                    const errorData = await res.json();
                    errorDiv.innerText = errorData.detail || 'Login failed';
                }
            } catch (err) {
                errorDiv.innerText = 'Network error connecting to server.';
            }
        }

        function logout() {
            accessToken = null;
            activeChatId = null;
            localStorage.removeItem('access_token');
            localStorage.removeItem('profile_picture');
            document.getElementById('login-overlay').classList.remove('hidden');
            document.getElementById('chatList').innerHTML = '';
            showEmptyState();
        }

        // --- Chat Management Functions --- //

        async function loadChats() {
            try {
                const res = await fetch(`${API_URL}/chats`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                if (res.ok) {
                    const chats = await res.json();
                    renderChatList(chats);
                    if (chats.length > 0 && !activeChatId) {
                        selectChat(chats[0].id);
                    } else if (chats.length === 0) {
                        showEmptyState();
                    }
                } else if (res.status === 401) {
                    logout();
                }
            } catch (e) {
                console.error('Failed to load chats', e);
            }
        }

        function renderChatList(chats) {
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === activeChatId ? 'active' : ''}`;
                div.onclick = () => selectChat(chat.id);

                div.innerHTML = `
                    <span class="chat-title">${chat.title}</span>
                    <button class="delete-btn" onclick="deleteChat('${chat.id}', event)">✕</button>
                `;
                list.appendChild(div);
            });
        }

        let availableAdvisors = {};

        async function openNewChatModal() {
            document.getElementById('new-chat-title').value = '';
            const select = document.getElementById('new-chat-advisor');
            select.innerHTML = '<option value="">Loading advisors...</option>';
            document.getElementById('new-chat-modal').classList.remove('hidden');

            try {
                const res = await fetch(`${API_URL}/advisors`);
                if (res.ok) {
                    availableAdvisors = await res.json();
                    select.innerHTML = '';
                    for (const [id, adv] of Object.entries(availableAdvisors)) {
                        select.innerHTML += `<option value="${id}">${adv.name}</option>`;
                    }
                }
            } catch (e) {
                select.innerHTML = '<option value="advisor1">General</option>';
            }
        }

        function closeNewChatModal() {
            document.getElementById('new-chat-modal').classList.add('hidden');
        }

        async function submitNewChat() {
            const title = document.getElementById('new-chat-title').value.trim() || 'New Chat';
            const advisor_id = document.getElementById('new-chat-advisor').value;
            if (!advisor_id) return;

            closeNewChatModal();

            try {
                const res = await fetch(`${API_URL}/chats`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify({ title, advisor_id })
                });
                if (res.ok) {
                    const newChat = await res.json();
                    await loadChats();
                    selectChat(newChat.id);
                }
            } catch (e) {
                console.error('Failed to create chat', e);
            }
        }

        async function deleteChat(id, event) {
            event.stopPropagation(); // Prevent selectChat from firing
            if (!confirm("Are you sure you want to delete this chat?")) return;

            try {
                const res = await fetch(`${API_URL}/chats/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                if (res.ok) {
                    if (activeChatId === id) {
                        activeChatId = null;
                        showEmptyState();
                    }
                    await loadChats();
                }
            } catch (e) {
                console.error('Failed to delete chat', e);
            }
        }

        async function selectChat(id) {
            activeChatId = id;
            document.getElementById('userInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;

            // Re-render list to highlight active
            const items = document.querySelectorAll('.chat-item');
            items.forEach(item => {
                if (item.querySelector('.delete-btn').getAttribute('onclick').includes(id)) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            const chatbox = document.getElementById('chatbox');
            const chatboxInner = document.getElementById('chatbox-inner');
            chatboxInner.innerHTML = '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

            try {
                const res = await fetch(`${API_URL}/chats/${id}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    const messages = data.messages;
                    const chatObj = data.chat;
                    chatboxInner.innerHTML = '';

                    // Fetch advisors to display name
                    if (Object.keys(availableAdvisors).length === 0) {
                        try {
                            const advRes = await fetch(`${API_URL}/advisors`);
                            if (advRes.ok) availableAdvisors = await advRes.json();
                        } catch (e) { }
                    }

                    let advisorName = "AI Advisor";
                    if (chatObj && chatObj.advisor_id && availableAdvisors[chatObj.advisor_id]) {
                        advisorName = availableAdvisors[chatObj.advisor_id].name;
                    }
                    document.getElementById('active-advisor-name').innerText = advisorName;

                    if (messages.length === 0) {
                        appendMessage('Hi! How can I assist you today?', 'ai');
                    } else {
                        messages.forEach(msg => {
                            appendMessage(msg.content, msg.role === 'user' ? 'user' : 'ai', false);
                        });
                        chatbox.scrollTop = chatbox.scrollHeight;
                    }
                }
            } catch (e) {
                console.error('Failed to load messages', e);
            }
        }

        function showEmptyState() {
            document.getElementById('chatbox-inner').innerHTML = '<div class="empty-chat">Select or create a chat to begin.</div>';
            document.getElementById('userInput').disabled = true;
            document.getElementById('sendBtn').disabled = true;
        }

        // --- Chat Interaction --- //

        function appendMessage(text, sender, autoScroll = true) {
            const chatboxInner = document.getElementById('chatbox-inner');
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');

            const avatar = document.createElement('div');
            avatar.classList.add('avatar', sender);
            if (sender === 'user') {
                const pictureUrl = localStorage.getItem('profile_picture');
                if (pictureUrl) {
                    avatar.innerHTML = `<img src="${pictureUrl}" alt="User" style="width:100%;height:100%;border-radius:6px;object-fit:cover;">`;
                    avatar.style.background = 'transparent';
                } else {
                    avatar.innerText = 'U';
                }
            } else {
                avatar.innerText = 'AI';
            }

            const content = document.createElement('div');
            content.classList.add('message-content');

            if (typeof marked !== 'undefined') {
                content.innerHTML = marked.parse(text);
            } else {
                content.innerText = text;
            }

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(content);
            chatboxInner.appendChild(msgDiv);

            if (autoScroll) {
                const chatbox = document.getElementById('chatbox');
                chatbox.scrollTop = chatbox.scrollHeight;
            }
        }

        function appendLoading() {
            const chatboxInner = document.getElementById('chatbox-inner');
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.id = 'loading-indicator';

            const avatar = document.createElement('div');
            avatar.classList.add('avatar', 'ai');
            avatar.innerText = 'AI';

            const content = document.createElement('div');
            content.classList.add('message-content');
            content.innerHTML = `
                <div class="loading">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            `;

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(content);
            chatboxInner.appendChild(msgDiv);

            const chatbox = document.getElementById('chatbox');
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function removeLoading() {
            const loader = document.getElementById('loading-indicator');
            if (loader) loader.remove();
        }

        async function sendMessage() {
            if (!accessToken || !activeChatId) return;

            const inputField = document.getElementById('userInput');
            const text = inputField.value.trim();
            const btn = document.getElementById('sendBtn');

            if (!text) return;

            inputField.value = '';
            inputField.disabled = true;
            btn.disabled = true;

            appendMessage(text, 'user');
            appendLoading();

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify({ prompt: text, chat_id: activeChatId })
                });

                removeLoading();

                if (response.ok) {
                    const data = await response.json();
                    appendMessage(data.response, 'ai');
                } else if (response.status === 401) {
                    logout();
                } else {
                    const errorTxt = await response.text();
                    appendMessage('Error: ' + response.status + ' ' + errorTxt, 'ai');
                }
            } catch (error) {
                removeLoading();
                appendMessage('Network error: ' + error.message, 'ai');
            } finally {
                inputField.disabled = false;
                btn.disabled = false;
                inputField.focus();
            }
        }
    </script>
</body>

</html>
