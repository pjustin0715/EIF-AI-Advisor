services:
  rag-service:
    build: ./rag-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - RAG_SERVICE_SECRET=${RAG_SERVICE_SECRET}

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - RAG_SERVICE_URL=http://rag-service:8001
    depends_on:
      - rag-service
